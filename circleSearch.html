    <body>
        <header></header>
        <script>
            (async () => {
                const res = await fetch("/header.html");
                document.querySelector("header").innerHTML = await res.text();
            })();
        </script>

        <!-- ここより下に書いてください -->
        <div class="userChoiceContainer">
            <div class="selectors">
                <p>絞り込み</p>
                <label for="clubType">サークル種別</label>
                <select id="clubType">
                    <option value="all" selected>すべて</option>
                    <option value="sports">運動系</option>
                    <option value="cultural">文化系</option>
                    <option value="committee">委員会</option>
                </select>
                <br />
                <label for="clubSize">サークル規模</label>
                <select id="clubSize">
                    <option value="all" selected>すべて</option>
                    <option value="small">10人以下</option>
                    <option value="medium">11-30人</option>
                    <option value="large">31人以上</option>
                </select>
            </div>

            <div class="sorters">
                <p>並べ替え</p>
                <select id="sortOrder">
                    <option value="nameAsc" selected>名前（昇順）</option>
                    <option value="nameDesc">名前（降順）</option>
                    <option value="activityHigh">活動頻度（高い順）</option>
                    <option value="activityLow">活動頻度（低い順）</option>
                    <option value="membersHigh">人数（多い順）</option>
                    <option value="membersLow">人数（少ない順）</option>
                    <option value="feeHigh">部費（高い順）</option>
                    <option value="feeLow">部費（安い順）</option>
                </select>
            </div>
        </div>
